<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Invoice</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h2>System</h2>
        </div>

        <ul class="menu">

            <li><a href="index.html"><i class="fa fa-house"></i> Dashboard</a></li>
            <li><a href="wo.html"><i class="fa fa-table"></i> Data</a></li>
            <li><a href="aktivasi.html"><i class="fa fa-bolt"></i> Aktivasi</a></li>
            <li><a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a></li>
            <li class="active"><a href="report.html"><i class="fa fa-chart-line"></i> Report</a></li>

        </ul>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="topbar">
            <h1>Report Invoice</h1>
        </div>

        <div class="table-box">

            <!-- FILTER -->
            <div class="filter-bar">

                <select id="filterStatus">
                    <option value="">Semua Status</option>
                    <option value="Open">Open</option>
                    <option value="Close">Close</option>
                    <option value="Pending">Pending</option>
                </select>

                <select id="filterJenis">
                    <option value="">Semua Jenis</option>
                    <option value="Aktivasi">Aktivasi</option>
                    <option value="Maintenance">Maintenance</option>
                </select>

                <button onclick="loadReport()">Filter</button>

            </div>

            <!-- SUMMARY -->
            <div class="summary">

                <div class="card">
                    <h3>Total Data</h3>
                    <p id="rTotalWO">0</p>
                </div>

                <div class="card">
                    <h3>Total Revenue</h3>
                    <p id="rTotalHarga">Rp 0</p>
                </div>

                <div class="card">
                    <h3>Total City</h3>
                    <p id="rTotalKota">0</p>
                </div>

            </div>

            <!-- TABLE -->
            <table>

                <thead>
                    <tr>
                        <th>Pra Invoice</th>
                        <th>Invoice Number</th>
                        <th>Invoice Name</th>
                        <th>Invoice Date</th>
                        <th>Periode</th>
                        <th>City</th>
                        <th>Jenis</th>
                        <th>Status</th>
                        <th>Total</th>
                    </tr>
                </thead>

                <tbody id="reportTable"></tbody>

            </table>

        </div>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/report.js"></script>

</body>
</html>
