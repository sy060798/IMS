<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report WO</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h2>WO System</h2>
        </div>

        <ul class="menu">

            <li><a href="index.html"><i class="fa fa-house"></i> Dashboard</a></li>
            <li><a href="wo.html"><i class="fa fa-table"></i> Data WO</a></li>
            <li><a href="aktivasi.html"><i class="fa fa-bolt"></i> Aktivasi</a></li>
            <li><a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a></li>
            <li class="active"><a href="report.html"><i class="fa fa-chart-line"></i> Report</a></li>

        </ul>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="topbar">
            <h1>Report WO</h1>
        </div>

        <div class="table-box">

            <!-- FILTER -->
            <div class="filter-bar">

                <select id="filterBulan">
                    <option value="">Semua Bulan</option>
                </select>

                <select id="filterJenis">
                    <option value="">Semua Jenis</option>
                    <option value="Aktivasi">Aktivasi</option>
                    <option value="Maintenance">Maintenance</option>
                </select>

                <button onclick="loadReport()">Filter</button>

            </div>

            <!-- SUMMARY -->
            <div class="summary">

                <div class="card">
                    <h3>Total WO</h3>
                    <p id="rTotalWO">0</p>
                </div>

                <div class="card">
                    <h3>Total Harga</h3>
                    <p id="rTotalHarga">Rp 0</p>
                </div>

                <div class="card">
                    <h3>Total Kota</h3>
                    <p id="rTotalKota">0</p>
                </div>

            </div>

            <!-- TABLE -->
            <table>

                <thead>
                    <tr>
                        <th>WO Number</th>
                        <th>Job Name</th>
                        <th>City</th>
                        <th>Wo End</th>
                        <th>Jenis</th>
                        <th>Status</th>
                        <th>WO Total</th>
                        <th>Pra Invoice Number</th>
                    </tr>
                </thead>

                <tbody id="reportTable"></tbody>

            </table>

        </div>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/report.js"></script>

</body>
</html>
