<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <h2>System</h2>
        </div>

        <ul class="menu">

            <li class="active">
                <a href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
            </li>

            <li><a href="wo.html"><i class="fa-solid fa-table"></i> Data</a></li>
            <li><a href="aktivasi.html"><i class="fa-solid fa-bolt"></i> Aktivasi</a></li>
            <li><a href="maintenance.html"><i class="fa-solid fa-screwdriver-wrench"></i> Maintenance</a></li>
            <li><a href="report.html"><i class="fa-solid fa-chart-column"></i> Report</a></li>

        </ul>

    </aside>

    <!-- Main -->
    <main class="main">

        <header class="topbar">
            <h1>Dashboard</h1>
        </header>

        <!-- CARD -->
        <section class="cards">

            <div class="card">
                <h3>Total Revenue</h3>
                <p id="totalHarga">Rp 0</p>
            </div>

            <div class="card">
                <h3>Total Open</h3>
                <p id="totalOpen">0</p>
            </div>

            <div class="card">
                <h3>Total Close</h3>
                <p id="totalClose">0</p>
            </div>

            <div class="card">
                <h3>Total Pending</h3>
                <p id="totalPending">0</p>
            </div>

        </section>

        <!-- CHART -->
        <section class="chart-box">

            <div class="chart">
                <h3>Distribusi Status</h3>
                <canvas id="statusPie"></canvas>
            </div>

            <div class="chart">
                <h3>Open vs Close</h3>
                <canvas id="statusBar"></canvas>
            </div>

        </section>

    </main>

</div>

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
