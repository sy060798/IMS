<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h2>System</h2>
        </div>

        <ul class="menu">

            <li class="active"><a href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a href="wo.html"><i class="fa-solid fa-table"></i> Data</a></li>
            <li><a href="aktivasi.html"><i class="fa-solid fa-bolt"></i> Aktivasi</a></li>
            <li><a href="maintenance.html"><i class="fa-solid fa-screwdriver-wrench"></i> Maintenance</a></li>
            <li><a href="report.html"><i class="fa-solid fa-chart-column"></i> Report</a></li>

        </ul>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="topbar">
            <h1>Dashboard</h1>
        </header>

        <!-- CARD -->
        <section class="cards">

            <div class="card">
                <h3>Total Revenue</h3>
                <p id="totalHarga">Rp 0</p>
            </div>

            <div class="card">
                <h3>Total Open</h3>
                <p id="totalOpen">0</p>
            </div>

            <div class="card">
                <h3>Total Close</h3>
                <p id="totalClose">0</p>
            </div>

            <div class="card">
                <h3>Total Pending</h3>
                <p id="totalPending">0</p>
            </div>

            <div class="card">
                <h3>Close Revenue</h3>
                <p id="totalCloseRevenue">Rp 0</p>
            </div>

            <div class="card">
                <h3>Pending Revenue</h3>
                <p id="totalPendingRevenue">Rp 0</p>
            </div>

        </section>

        <!-- CHART -->
        <section class="chart-box">

            <div class="chart">
                <h3>Status Distribution</h3>
                <canvas id="statusPie"></canvas>
            </div>

            <div class="chart">
                <h3>Open vs Close</h3>
                <canvas id="statusBar"></canvas>
            </div>

        </section>

        <!-- PENDING LIST -->
        <section class="table-box">

            <h2>Pending List</h2>

            <table>

                <thead>
                    <tr>
                        <th>Pra Invoice</th>
                        <th>Name</th>
                        <th>City</th>
                        <th>Total</th>
                    </tr>
                </thead>

                <tbody id="pendingTable"></tbody>

            </table>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
