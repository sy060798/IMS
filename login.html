<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - WO Management</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f6f9;
        }

        .login-box{
            width:380px;
            background:#fff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:30px;
            color:#2563eb;
        }

        .login-box button{
            width:100%;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:15px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>WO Management</h2>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <p id="error" class="error"></p>

</div>

<script>

function login(){

    const username=document.getElementById("username").value;
    const password=document.getElementById("password").value;

    // sementara hardcode
    if(username==="admin" && password==="admin123"){

        localStorage.setItem("login","true");

        window.location="index.html";

    }else{

        document.getElementById("error").innerHTML="Username atau Password salah";

    }

}

</script>

</body>
</html>
